version: '3.8'

services:
  # ==========================================
  # Frontend: React + Nginx
  # ==========================================
  frontend:
    container_name: disciplinedash-frontend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend-api
    networks:
      - app-network

  # ==========================================
  # Backend: Node.js + Stunnel
  # ==========================================
  backend-api:
    container_name: disciplinedash-backend-api
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      # Variáveis de ambiente do .env
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_DATABASE=${DB_DATABASE}
      - DB_PORT=${DB_PORT}
      - DB_ENCRYPT=${DB_ENCRYPT}
      - DB_TRUST_SERVER_CERTIFICATE=${DB_TRUST_SERVER_CERTIFICATE}
      - PORT=${PORT:-3001}
      - NODE_ENV=production
    networks:
      - app-network
    # Volume para logs (opcional, útil para debug)
    volumes:
      - ./logs:/var/log/stunnel
    # Healthcheck
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# Rede para comunicação entre containers
networks:
  app-network:
    driver: bridge